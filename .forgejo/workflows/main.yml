name: Build and Test

on: [push, pull_request]

jobs:
  build:
    # Use the standard gitea.com shared runner environment.
    # TODO extend to multi-run with fedora as well
    runs-on: opensuse-leap
    container:
      image: opensuse/leap:latest

    # Environment variables remain the same.
    env:
      CFLAGS: -pthread -Wno-unused-result -O2 -g -pipe -Wall -Wp,-D_FORTIFY_SOURCE=2 -fstack-protector-strong --param=ssp-buffer-size=4 -grecord-gcc-switches -mtune=generic -D_GNU_SOURCE -fwrapv

    steps:
      - name: Prepare container
        run: |
          zypper refresh
          zypper dist-upgrade -y
          zypper install --no-confirm nodejs20 git-core

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install dependencies using OpenSUSE's 'zypper'.
      - name: Install system dependencies
        run: |
          zypper install --no-confirm --force-resolution pattern:devel_rpm_build pattern:devel_C_C++ osc
          zypper install --no-confirm --force-resolution swig python3-devel python3-pip libopenssl-devel openssl python3-docutils python3-setuptools python3-service_identity python3-Twisted python3-twine python3-wheel python3-flake8

      - name: Build wheel
        run: |
          export PATH=$PATH:$HOME/.local/bin
          python3 -mpip install --user -r dev-requirements.txt
          python3 -mpip wheel --verbose --no-cache-dir --no-clean --no-build-isolation --wheel-dir dist/ --editable .
          find . -name \*.c
          find . -name \*.whl -o -name \*.tar.gz
          mkdir -p shadowing/sys && touch shadowing/sys/types.h
          # Dynamically determine the build path for PYTHONPATH
          export PYTHONPATH_DYNAMIC=$(readlink -f build/lib.*)
          # We no longer export this to GITEA_ENV to improve compatibility.
          python3 -mpip install -v --upgrade --target ${PYTHONPATH_DYNAMIC} --no-compile --ignore-installed --no-deps --no-index dist/[mM]2[cC]rypto*.whl

#      There is no mypy for Python 3.6 and certainly not in openSUSE/Leap packages
#      - name: Run mypy check
#        run: |
#          # Recalculate PYTHONPATH directly in this step.
#          PYTHONPATH=$(readlink -f build/lib.*) python3 -mmypy --no-color-output src/M2Crypto

      - name: Run unittests
        run: |
          # Recalculate PYTHONPATH directly in this step.
          export PYTHONPATH=$(readlink -f build/lib.*)
          python3 -munittest discover -b -v tests
          python3 -mdoctest -v src/M2Crypto/SSL/Checker.py
          # case $BUILD_SUBMITTER in
          #    *git.sr.ht*)
          #         [ -n "$GIT_REF" ] && REASON="$JOB_ID ($GIT_REF)"
          #         [ -n "$PATCHSET_URL" ] && REASON="$JOB_ID ($PATCHSET_URL)"
          #         echo "Sourcehut build $BUILD_REASON finished with the result $? ($JOB_URL)." \
          #             | .builds/irc-send irc.libera.chat m2bot mcepl "#m2crypto"
          #    ;;
          # esac
          echo "Test task finished."

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            src/SWIG/_m2crypto_wrap.c
            dist/*.whl
            dist/*.tar.gz
